# git-cliff configuration.
# Keep this boring: scoped Conventional Commits in, compact release notes out.

[changelog]
header = """
# Changelog

All notable changes are documented here.

"""
body = """
{% if version -%}
## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## Unreleased
{% endif -%}
{{ "\n" -}}
{% for group, commits in commits | group_by(attribute="group") -%}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{% if commit.breaking %}**BREAKING:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true
footer = """

<!-- generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"

commit_parsers = [
  { message = "^chore\\(release\\):", skip = true },
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 1 -->Fixed" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Changed" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^style", group = "<!-- 5 -->Style" },
  { message = "^test", group = "<!-- 6 -->Tests" },
  { message = "^build", group = "<!-- 7 -->Build" },
  { message = "^ci", group = "<!-- 8 -->CI" },
  { message = "^chore", group = "<!-- 9 -->Chores" },
  { message = ".*", group = "<!-- 10 -->Other" },
]

[remote]
offline = true
